<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First-Blood Clone</title>
  <style>
    @font-face {
      font-family: "Nightmare Pills";
      src: url("./NightmarePills-BV2w.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #000000;
      --blood: #a30008;
      --blood-dark: #6e0004;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      background: #000;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 2rem;
    }

    .title {
      display: inline-flex;
      align-items: baseline;
      color: var(--blood);
      font-family: "Nightmare Pills", "Old English Text MT", serif;
      font-size: clamp(4.6rem, 9vw, 9.8rem);
      line-height: 1;
            white-space: nowrap;
      user-select: none;
      letter-spacing: 0.015em;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      text-shadow:
        0 0 0.5px var(--blood-dark),
        0 0 1px var(--blood-dark),
        0 0 4px rgba(90, 0, 0, 0.25);
      transform: translateY(-0.02em);
    }

    .word {
      display: inline-block;
    }

    .dash {
      display: inline-block;
      margin: 0 0.05em;
      transform: translateY(-0.01em);
    }

    @media (max-width: 900px) {
      .title {
        font-size: clamp(3rem, 12vw, 6.3rem);
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="title" aria-label="First-Blood">
      <span class="word">First</span><span class="dash">-</span><span class="word">Blood</span>
    </div>
  </main>
</body>
</html>
